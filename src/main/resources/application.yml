spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/my_blog_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 600000
      connection-timeout: 30000
      validation-timeout: 5000
      connection-test-query: SELECT 1
      keepalive-time: 30000
  redis:
    host: ${REDIS_HOST}
    port: 6379
    password: ${REDIS_PASSWORD}
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
      shutdown-timeout: 100ms
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.cs.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.cs.entity
  mapper-locations: classpath:mapper/*.xml
logging:
  level:
    com.cs.mapper: debug
server:
  port: 8081